name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests with scoped coverage
        run: |
          python -m pytest -q \
            --cov=order_manager \
            --cov=execution_client \
            --cov=reconciliation_service \
            --cov=position_manager \
            --cov=contract_target_builder \
            --cov-fail-under=60
